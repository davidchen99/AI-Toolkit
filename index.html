<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI 工具集展示</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;700&family=Noto+Sans+SC:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg: #FAF8F5;
      --card-bg: #FFFFFF;
      --text: #2D2A26;
      --text-muted: #8A8279;
      --accent: #C4A484;
      --accent-dark: #A68B6A;
      --border: #E8E3DC;
      --shadow: rgba(45, 42, 38, 0.06);
      --design: linear-gradient(135deg, #E8D5C4 0%, #C4A484 100%);
      --tech: linear-gradient(135deg, #D4DEE8 0%, #7BA3C4 100%);
      --biz: linear-gradient(135deg, #E8E4D4 0%, #C4B484 100%);
      --office: linear-gradient(135deg, #D4E8D8 0%, #7BC49B 100%);
      --human: linear-gradient(135deg, #E8D4D4 0%, #C48484 100%);
    }

    body {
      font-family: 'Noto Sans SC', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    /* Header */
    header {
      background: var(--card-bg);
      padding: 2.5rem 2rem 2rem;
      text-align: center;
      border-bottom: 1px solid var(--border);
      position: sticky;
      top: 0;
      z-index: 100;
    }

    header h1 {
      font-family: 'Noto Serif SC', serif;
      font-size: 2rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      margin-bottom: 0.3rem;
    }

    header p {
      font-size: 0.85rem;
      color: var(--text-muted);
      font-weight: 300;
    }

    /* Search */
    .search-wrap {
      max-width: 600px;
      margin: 1.5rem auto 0;
      position: relative;
    }

    .search-input {
      width: 100%;
      padding: 0.9rem 1.2rem 0.9rem 3rem;
      border: 1px solid var(--border);
      border-radius: 50px;
      font-size: 0.95rem;
      font-family: inherit;
      background: var(--bg);
      transition: all 0.3s;
    }

    .search-input:focus {
      outline: none;
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(196, 164, 132, 0.15);
    }

    .search-icon {
      position: absolute;
      left: 1.2rem;
      top: 50%;
      transform: translateY(-50%);
      color: var(--text-muted);
      font-size: 1rem;
    }

    /* Filter Bar */
    .filter-bar {
      padding: 1rem 2rem;
      display: flex;
      justify-content: center;
      flex-wrap: wrap;
      gap: 0.5rem;
      background: var(--card-bg);
      border-bottom: 1px solid var(--border);
    }

    .filter-btn {
      font-family: inherit;
      padding: 0.5rem 1.2rem;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--text-muted);
      font-size: 0.85rem;
      cursor: pointer;
      border-radius: 50px;
      transition: all 0.25s;
    }

    .filter-btn:hover { border-color: var(--accent); color: var(--accent); }
    .filter-btn.active { background: var(--accent); color: #fff; border-color: var(--accent); }

    /* Main Grid */
    main { max-width: 1400px; margin: 0 auto; padding: 2rem 1.5rem; }

    .masonry {
      columns: 4;
      column-gap: 1.2rem;
    }

    @media (max-width: 1100px) { .masonry { columns: 3; } }
    @media (max-width: 800px) { .masonry { columns: 2; } }
    @media (max-width: 500px) { .masonry { columns: 2; column-gap: 0.8rem; } main { padding: 1rem 0.8rem; } }

    /* Card */
    .card {
      break-inside: avoid;
      margin-bottom: 1.2rem;
      background: var(--card-bg);
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 2px 12px var(--shadow);
      transition: transform 0.3s, box-shadow 0.3s;
      display: inline-block;
      width: 100%;
    }

    .card:hover {
      transform: translateY(-4px);
      box-shadow: 0 12px 32px rgba(45, 42, 38, 0.12);
    }

    .card-img {
      width: 100%;
      aspect-ratio: 16/10;
      object-fit: cover;
      display: block;
    }

    .card-body { padding: 1rem; }

    .card-title {
      font-family: 'Noto Serif SC', serif;
      font-size: 1rem;
      font-weight: 600;
      margin-bottom: 0.5rem;
      line-height: 1.3;
    }

    .card-tags { display: flex; flex-wrap: wrap; gap: 0.4rem; margin-bottom: 0.6rem; }

    .card-tag {
      font-size: 0.7rem;
      padding: 0.2rem 0.6rem;
      border-radius: 50px;
      background: var(--bg);
      color: var(--text-muted);
    }

    .card-tag.primary { background: var(--accent); color: #fff; }

    .card-desc {
      font-size: 0.8rem;
      color: var(--text-muted);
      line-height: 1.5;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .card-footer {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 0.8rem;
      padding-top: 0.8rem;
      border-top: 1px solid var(--border);
    }

    .card-stars { color: var(--accent); font-size: 0.8rem; letter-spacing: 2px; }
    .card-link { font-size: 0.75rem; color: var(--accent); text-decoration: none; }
    .card-link:hover { color: var(--accent-dark); text-decoration: underline; }

    /* Empty / Stats */
    .stats { text-align: center; padding: 1rem; color: var(--text-muted); font-size: 0.85rem; }
    .empty { text-align: center; padding: 4rem 2rem; color: var(--text-muted); }
    .empty-icon { font-size: 3rem; margin-bottom: 1rem; opacity: 0.5; }

    /* Modal */
    .modal {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.7);
      z-index: 1000;
      justify-content: center;
      align-items: center;
      padding: 2rem;
    }
    .modal.active { display: flex; }
    .modal-box {
      max-width: 700px;
      width: 100%;
      background: var(--card-bg);
      border-radius: 16px;
      overflow: hidden;
      position: relative;
    }
    .modal-close {
      position: absolute;
      top: 1rem;
      right: 1rem;
      width: 36px;
      height: 36px;
      background: rgba(0,0,0,0.5);
      color: #fff;
      border: none;
      border-radius: 50%;
      font-size: 1.2rem;
      cursor: pointer;
      z-index: 10;
    }
    .modal-img {
      width: 100%;
      aspect-ratio: 16/9;
      object-fit: cover;
    }
    .modal-info { padding: 1.5rem; }
    .modal-title { font-family: 'Noto Serif SC', serif; font-size: 1.3rem; margin-bottom: 0.5rem; }
    .modal-desc { color: var(--text-muted); font-size: 0.9rem; }
  </style>
</head>

    let currentFilter = 'all';
    let searchQuery = '';

    function getGradient(type) {
      const gradients = {
        '设计': 'linear-gradient(135deg, #E8D5C4 0%, #C4A484 100%)',
        '科技': 'linear-gradient(135deg, #D4DEE8 0%, #7BA3C4 100%)',
        '商业': 'linear-gradient(135deg, #E8E4D4 0%, #C4B484 100%)',
        '办公': 'linear-gradient(135deg, #D4E8D8 0%, #7BC49B 100%)',
        '人文': 'linear-gradient(135deg, #E8D4D4 0%, #C48484 100%)'
      };
      return gradients[type] || 'linear-gradient(135deg, #E8E3DC 0%, #C4C4C4 100%)';
    }

    function getIcon(type) {
      const icons = {
        '设计': '🎨', '科技': '⚡', '商业': '💼', '办公': '📊', '人文': '📚'
      };
      return icons[type] || '🔧';
    }

    function getStars(rating) {
      const n = rating || 0;
      return '★'.repeat(n) + '☆'.repeat(5 - n);
    }

    function createCard(video) {
      const grad = getGradient(video.type);
      const icon = getIcon(video.type);
      const initials = video.name.slice(0, 2).toUpperCase();

      return '<div class="card" onclick="openModal(' + video.id + ')">' +
        '<div class="card-img" style="background:' + grad + ';display:flex;align-items:center;justify-content:center;">' +
        '<span style="font-size:2.5rem;color:rgba(255,255,255,0.9);">' + icon + '</span></div>' +
        '<div class="card-body">' +
        '<h3 class="card-title">' + video.name + '</h3>' +
        '<div class="card-tags">' +
        (video.type ? '<span class="card-tag primary">' + video.type + '</span>' : '') +
        (video.category ? '<span class="card-tag">' + video.category + '</span>' : '') +
        '</div>' +
        (video.description ? '<p class="card-desc">' + video.description + '</p>' : '') +
        '<div class="card-footer">' +
        '<span class="card-stars">' + getStars(video.rating) + '</span>' +
        (video.url ? '<a href="' + video.url + '" target="_blank" class="card-link" onclick="event.stopPropagation()">访问 →</a>' : '') +
        '</div></div></div>';
    }

    function render() {
      const grid = document.getElementById('grid');
      const empty = document.getElementById('empty');
      const stats = document.getElementById('stats');

      let filtered = allVideos;

      if (currentFilter !== 'all') {
        filtered = filtered.filter(v => v.type === currentFilter);
      }

      if (searchQuery) {
        const q = searchQuery.toLowerCase();
        filtered = filtered.filter(v =>
          v.name.toLowerCase().includes(q) ||
          (v.type && v.type.toLowerCase().includes(q)) ||
          (v.category && v.category.toLowerCase().includes(q)) ||
          (v.description && v.description.toLowerCase().includes(q))
        );
      }

      if (filtered.length === 0) {
        grid.innerHTML = '';
        empty.style.display = 'block';
        stats.textContent = '';
        return;
      }

      empty.style.display = 'none';
      stats.textContent = currentFilter === 'all' && !searchQuery
        ? '共 ' + filtered.length + ' 个工具'
        : '筛选结果：' + filtered.length + ' 个工具';
      grid.innerHTML = filtered.map(createCard).join('');
    }

    function openModal(id) {
      const v = allVideos.find(x => x.id === id);
      if (!v) return;

      const modal = document.getElementById('modal');
      document.getElementById('modalImg').style.cssText = 'width:100%;aspect-ratio:16/9;object-fit:cover;background:' + getGradient(v.type) + ';display:flex;align-items:center;justify-content:center;';
      document.getElementById('modalImg').outerHTML = '<div style="width:100%;aspect-ratio:16/9;background:' + getGradient(v.type) + ';display:flex;align-items:center;justify-content:center;"><span style="font-size:4rem;color:rgba(255,255,255,0.9);">' + getIcon(v.type) + '</span></div>';
      document.getElementById('modalTitle').textContent = v.name;
      document.getElementById('modalDesc').textContent = v.description || '';
      modal.classList.add('active');
      document.body.style.overflow = 'hidden';
    }

    function closeModal() {
      document.getElementById('modal').classList.remove('active');
      document.body.style.overflow = '';
    }

    // Event listeners
    document.querySelectorAll('.filter-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        currentFilter = btn.dataset.filter;
        render();
      });
    });

    document.getElementById('searchInput').addEventListener('input', e => {
      searchQuery = e.target.value.trim();
      render();
    });

    document.getElementById('modal').addEventListener('click', e => {
      if (e.target.id === 'modal') closeModal();
    });

    document.addEventListener('keydown', e => {
      if (e.key === 'Escape') closeModal();
    });

    render();
  </script>
